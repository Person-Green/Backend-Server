spring:
  config:
    import: optional:file:.env[.properties]
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: ${HIBERNATE_DDL_AUTO:none}
    properties:
      hibernate:
        format_sql: false
    show-sql: ${SHOW_SQL:false}

auth:
  jwt:
    issuer: peopleandgreen
    secret: ${AUTH_JWT_SECRET}
    access-token-validity-seconds: 900
    refresh-token-validity-seconds: 1209600
    state-token-validity-seconds: 300
  google:
    client-id: ${GOOGLE_CLIENT_ID}
    client-secret: ${GOOGLE_CLIENT_SECRET}
    token-uri: https://oauth2.googleapis.com/token
    authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
    scope:
      - openid
      - email
      - profile
    allowed-redirect-uris:
      - ${GOOGLE_REDIRECT_URI}
    enforce-https-redirect-uris: ${ENFORCE_HTTPS_REDIRECT_URIS:true}

security:
  require-https: ${REQUIRE_HTTPS:true}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

springdoc:
  api-docs:
    enabled: ${SPRINGDOC_ENABLED:false}
  swagger-ui:
    path: /swagger-ui.html
    enabled: ${SPRINGDOC_ENABLED:false}
    operations-sorter: alpha
    tags-sorter: alpha

recommendation:
  policy:
    sunlight-exact-score: 30
    sunlight-adjacent-score: 15
    ventilation-exact-score: 10
    ventilation-adjacent-score: 5
    temperature-exact-score: 20
    temperature-soft-margin: 3
    temperature-hard-margin: 7
    humidity-exact-score: 15
    humidity-soft-margin: 10
    humidity-hard-margin: 20
    low-care-long-cycle-days: 14
    low-care-medium-cycle-days: 7
    low-care-long-cycle-score: 5
    low-care-medium-cycle-score: 3
    low-care-short-cycle-score: 1
    medium-care-min-cycle-days: 7
    medium-care-max-cycle-days: 14
    medium-care-ideal-score: 5
    medium-care-long-cycle-score: 4
    medium-care-short-cycle-score: 3
    high-care-short-cycle-days: 7
    high-care-medium-cycle-days: 14
    high-care-short-cycle-score: 5
    high-care-medium-cycle-score: 4
    high-care-long-cycle-score: 3
    pet-caution-penalty: 18
    pet-toxic-penalty: 100
    max-recommendations: 10
